[package]
name = "cli"
version = "0.1.0"
edition = "2024"

[dependencies]
agent = { path = "../agent", features = ["openai-compatible"] }
anyhow = "1"
dirs = "6"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
