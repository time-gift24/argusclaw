# rustfmt.toml

# ==========================================
# 核心设置
# ==========================================

# 必须项：指定你的 Rust 版本 (2015, 2018, 2021, 或 2024)
# 这决定了 rustfmt 如何解析某些特定的语法（如 async/await）
edition = "2021"

# 单行最大字符数。超过此限制 rustfmt 会尝试折行。 (默认: 100)
# 很多团队喜欢改成 80 或 120，视你的屏幕宽度和习惯而定。
max_width = 100

# ==========================================
# 缩进与换行
# ==========================================

# 缩进类型：不使用 Tab，使用空格 (默认: false)
hard_tabs = false

# 缩进的空格数量 (默认: 4)
tab_spaces = 4

# 换行符风格。"Unix" (\n), "Windows" (\r\n), "Native" 或 "Auto" (默认: "Auto")
# 推荐强制使用 "Unix" 以避免跨平台协作时的 Git 换行符冲突。
newline_style = "Unix"

# ==========================================
# 代码组织与启发式规则
# ==========================================

# 控制何时将较短的代码块（如结构体、枚举、闭包）合并在一行内。
# "Default" 是官方平衡的标准；设为 "Max" 会让代码尽可能紧凑；"Off" 则严格换行。
use_small_heuristics = "Default"

# 自动合并连续的 `#[derive(...)]` 属性 (默认: true)
# 开启后： #[derive(Debug)] 和 #[derive(Clone)] 会变成 #[derive(Debug, Clone)]
merge_derives = true

# 按字母顺序对 `use` 导入语句进行排序 (默认: true)
reorder_imports = true

# 按字母顺序对 `mod` 模块声明进行排序 (默认: true)
reorder_modules = true
